services:

  # Single service: FastAPI backend (port 8000, internal) +
  # Streamlit frontend (port $PORT, public).
  # Both run in the same container so frontend reaches backend via localhost.
  - type: web
    name: mr-feedback-dashboard
    env: python
    rootDir: Build_Dashboard
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      uvicorn backend:app --host 127.0.0.1 --port 8000 &
      streamlit run frontend.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
